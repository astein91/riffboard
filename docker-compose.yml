version: '3.8'

services:
  riffboard:
    build: .
    container_name: riffboard
    ports:
      - "3456:3456"
    volumes:
      # Persist API keys across container restarts
      - riffboard-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3456
      - KEYS_FILE=/data/riffboard-keys.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  riffboard-data:
    driver: local
