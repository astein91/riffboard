version: '3.8'

services:
  riffboard:
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: riffboard
    ports:
      - "3456:3456"
    volumes:
      # Persist SQLite DB + project files across container restarts
      - riffboard-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3456
      - DB_PATH=/data/riffboard.db
      - DATA_DIR=/data
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  riffboard-data:
    driver: local
